input "type:keyboard" {
    xkb_options "caps:ctrl_modifier,ctrl:swap_lalt_lctl, grp:shifts_toggle" 
    xkb_layout "us,ru"

} 

bindsym $mod+Shift+e exec wlogout -b 4 --layout ~/.config/wlogout/layout --css ~/.config/wlogout/style.css --column-spacing 0 --row-spacing 0 --margin-top 500 --margin-bottom 500 --margin-left 700 --margin-right 700
bindsym $mod+Shift+Tab exec swaymsg move workspace to output $(swaymsg -t get_outputs | jq -r '.[] | select(.focused==false).name')
